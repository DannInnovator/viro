<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro.bee - Animation Sandbox</title>
    <link rel="stylesheet" href="style.css"> <!-- Hereda tus estilos base -->
    <style>
        .sandbox-container {
            max-width: 900px;
            margin: 20px auto;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
        }
        .row-actores {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .tester-card {
            background: #0a0d14;
            border: 1px solid #21262d;
            border-radius: 6px;
            padding: 15px;
            width: 180px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .panel-controles {
            display: flex;
            flex-direction: column;
            gap: 5px;
            width: 100%;
            margin-top: 10px;
        }
        .btn-test {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            cursor: pointer;
            font-family: inherit;
        }
        .btn-test:hover { background: #30363d; border-color: #8b949e; }
        .btn-die-test { border-color: #da3633; color: #f85149; }
        .btn-die-test:hover { background: #da3633; color: white; }
    </style>
</head>
<body>
    <div class="game-container" style="max-width: 950px;">
        <h1>🧪 Viro.bee - Laboratorio de Animaciones</h1>
        <p class="subtitle">Ajusta y calibra los píxeles de tus hojas de sprites en vivo</p>

        <div class="sandbox-container">
            <div class="row-actores">
                
                <!-- CEPA CAPARAZÓN -->
                <div class="tester-card">
                    <strong style="color: #58a6ff; font-size: 0.85rem;">🛡️ Caparazón</strong>
                    <div class="sprite-container-arena" style="margin: 15px 0;">
                        <div class="sprite-battle anim-idle" id="sprite-caparazon" style="background-image: url('alfa.png'); background-position: -8px -40px; --base-x: -8px; --die-x: -788px;"></div>
                    </div>
                    <div class="panel-controles">
                        <button class="btn-test" onclick="cambiarEstado('sprite-caparazon', 'idle')">🔄 Reposar (Idle)</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-caparazon', 'atacar')">⚔️ Atacar</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-caparazon', 'herido')">💥 Herido</button>
                        <button class="btn-test btn-die-test" onclick="cambiarEstado('sprite-caparazon', 'muerte')">💀 Morir (Die)</button>
                    </div>
                </div>

                <!-- CEPA ALFA -->
                <div class="tester-card">
                    <strong style="color: #00ff66; font-size: 0.85rem;"> 🦠 Cepa Alfa</strong>
                    <div class="sprite-container-arena" style="margin: 15px 0;">
                        <div class="sprite-battle anim-idle" id="sprite-alfa" style="background-image: url('alfa.png'); background-position: -8px -395px; --base-x: -8px; --die-x: -788px;"></div>
                    </div>
                    <div class="panel-controles">
                        <button class="btn-test" onclick="cambiarEstado('sprite-alfa', 'idle')">🔄 Reposar (Idle)</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-alfa', 'atacar')">⚔️ Atacar</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-alfa', 'herido')">💥 Herido</button>
                        <button class="btn-test btn-die-test" onclick="cambiarEstado('sprite-alfa', 'muerte')">💀 Morir (Die)</button>
                    </div>
                </div>

                <!-- CÉLULA EPITELIAL -->
                <div class="tester-card">
                    <strong style="color: #fff; font-size: 0.85rem;">⚪ Célula</strong>
                    <div class="sprite-container-arena" style="margin: 15px 0;">
                        <div class="sprite-battle anim-idle" id="sprite-celula" style="background-image: url('enemies.png'); background-position: -8px -40px; --base-x: -8px; --die-x: -788px;"></div>
                    </div>
                    <div class="panel-controles">
                        <button class="btn-test" onclick="cambiarEstado('sprite-celula', 'idle')">🔄 Reposar (Idle)</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-celula', 'atacar')">⚔️ Atacar</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-celula', 'herido')">💥 Herido</button>
                        <button class="btn-test btn-die-test" onclick="cambiarEstado('sprite-celula', 'muerte')">💀 Morir (Die)</button>
                    </div>
                </div>

                <!-- LINFOCITO T -->
                <div class="tester-card">
                    <strong style="color: #ff3333; font-size: 0.85rem;">🏹 Linfocito T</strong>
                    <div class="sprite-container-arena" style="margin: 15px 0;">
                        <div class="sprite-battle anim-idle" id="sprite-linfocito" style="background-image: url('enemies.png'); background-position: -8px -220px; --base-x: -8px; --die-x: -788px;"></div>
                    </div>
                    <div class="panel-controles">
                        <button class="btn-test" onclick="cambiarEstado('sprite-linfocito', 'idle')">🔄 Reposar (Idle)</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-linfocito', 'atacar')">⚔️ Atacar</button>
                        <button class="btn-test" onclick="cambiarEstado('sprite-linfocito', 'herido')">💥 Herido</button>
                        <button class="btn-test btn-die-test" onclick="cambiarEstado('sprite-linfocito', 'muerte')">💀 Morir (Die)</button>
                    </div>
                </div>

            </div>
            <p style="font-size:0.75rem; color:#8b949e; margin:0;">💡 Truco: Usa las herramientas de desarrollo (F12) para ajustar los valores de <code>--base-x</code> o <code>--die-x</code> en vivo si ves que alguna animación se descalza.</p>
        </div>
    </div>

    <script>
        function cambiarEstado(idSprite, estado) {
            const el = document.getElementById(idSprite);
            if (!el) return;

            // Limpiamos clases previas
            el.className = "sprite-battle";

            if (estado === 'idle') {
                el.classList.add("anim-idle");
            } 
            else if (estado === 'atacar') {
                el.classList.add("anim-atacar");
                setTimeout(() => { el.classList.remove("anim-atacar"); el.classList.add("anim-idle"); }, 400);
            } 
            else if (estado === 'herido') {
                el.classList.add("anim-herido");
                setTimeout(() => { el.classList.remove("anim-herido"); el.classList.add("anim-idle"); }, 300);
            } 
            else if (estado === 'muerte') {
                el.classList.add("anim-muerte");
            }
        }
    </script>
</body>
</html>
