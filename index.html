<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viro.bee - Interfaz Evolucionada</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>🦠 Viro.bee</h1>
        <p class="subtitle">Ecosistema de Juegos -bee</p>
        
        <div id="pantalla-mapa" class="screen">
            
            <div class="team-management">
                <h4>🧬 TU CADENA VIRAL (Orden de Combate)</h4>
                <div class="team-slots">
                    <div class="slot-card" id="slot-0">
                        <span class="slot-pos">1º (Frente)</span>
                        <div class="slot-sprite-container"><div class="slot-sprite" id="slot-0-sprite"></div></div>
                        <div class="slot-name" id="slot-0-nombre">Tanque</div>
                        
                        <div class="health-bar-container-map">
                            <div class="health-bar-map" id="slot-0-hp-bar"></div>
                        </div>
                        <div class="slot-hp-text" id="slot-0-hp-text">HP: --/--</div>
                        
                        <div class="slot-desc" id="slot-0-desc">Cargando...</div>
                    </div>
                    <div class="slot-arrow">➔</div>
                    <div class="slot-card" id="slot-1">
                        <span class="slot-pos">2º (Retaguardia)</span>
                        <div class="slot-sprite-container"><div class="slot-sprite" id="slot-1-sprite"></div></div>
                        <div class="slot-name" id="slot-1-nombre">Alfa</div>
                        
                        <div class="health-bar-container-map">
                            <div class="health-bar-map" id="slot-1-hp-bar"></div>
                        </div>
                        <div class="slot-hp-text" id="slot-1-hp-text">HP: --/--</div>
                        
                        <div class="slot-desc" id="slot-1-desc">Cargando...</div>
                    </div>
                </div>
                <button id="btn-invertir-orden" style="margin-top: 15px; background-color: #1f6feb; padding: 8px 16px; font-size: 0.85rem;">🔄 CAMBIAR ORDEN DE FILA</button>
            </div>

            <hr style="border: 0; border-top: 1px solid #21262d; margin: 20px 0;">
            <h3>🗺️ Selecciona el siguiente tejido a infectar:</h3>
            <div id="mapa-nodos" class="map-grid"></div>
        </div>

        <div id="pantalla-combate" class="screen hidden">
            <div class="battle-arena">
                <div class="controles-combate">
                    <button id="btn-velocidad-1x" class="btn-battle">⏳ AUTO 1X</button>
                    <button id="btn-velocidad-3x" class="btn-battle-fast">⚡ AUTO 3X</button>
                    <button id="btn-salir-nodo" class="btn-battle hidden">➔ VOLVER AL MAPA</button>
                </div>

                <div class="battle-display">
                    <div class="actor-card" id="card-virus">
                        <div class="sprite-container-arena"><div class="sprite-battle" id="virus-render-sprite"></div></div>
                        <div class="actor-name" id="virus-nombre">Cepa...</div>
                        <div class="health-bar-container">
                            <div class="health-bar" id="virus-bar"></div>
                            <div class="shield-bar" id="virus-shield-bar"></div>
                        </div>
                        <div class="actor-stats" id="virus-stats">HP: 0/0</div>
                    </div>
                    
                    <div class="versus">VS</div>
                    
                    <div class="actor-card" id="card-enemigo">
                        <div class="sprite-container-arena"><div class="sprite-battle" id="enemigo-render-sprite"></div></div>
                        <div class="actor-name" id="enemigo-nombre">Célula...</div>
                        <div class="health-bar-container">
                            <div class="health-bar" id="enemigo-bar"></div>
                        </div>
                        <div class="actor-stats" id="enemigo-stats">HP: 0/0</div>
                    </div>
                </div>
                <div id="log-consola" class="console-box-mini"></div>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
